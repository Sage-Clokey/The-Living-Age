<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Living Age Trilogy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07090a;
  --bg2: #0c0f0c;
  --bg3: #0c1008;
  --text: #ddd9cc;
  --dim: #6a6860;
  --green: #7a9e7e;
  --gold: #b8973a;
  --flame: #4aaa5a;
  --red: #9e5a4a;
  --line: rgba(255,255,255,0.07);
  --max: 680px;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Jost', Helvetica, Arial, sans-serif;
  --mono: 'Courier New', Courier, monospace;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  font-weight: 300;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 28px;
  overflow: hidden;
}

.hero canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 24px;
}

.hero h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(2.8rem, 6vw, 5.5rem);
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 16px;
}

.hero-subtitle {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  color: var(--gold);
  margin-bottom: 32px;
}

.hero-epigraph {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: var(--dim);
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.9;
}

.hero-epigraph em {
  color: var(--green);
  font-style: normal;
}

.scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--dim);
  animation: pulse 2.5s ease-in-out infinite;
  z-index: 1;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

/* ===== SECTION LABELS ===== */
.section-label {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 40px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ===== MANIFESTO / STATS ===== */
.manifesto {
  background: var(--bg2);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 100px 28px;
}

.manifesto-inner {
  max-width: 820px;
  margin: 0 auto;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 2px;
  margin-bottom: 48px;
}

.stat-card {
  background: var(--bg);
  padding: 32px 24px;
  text-align: center;
  transition: background 0.3s;
}

.stat-card:hover {
  background: var(--bg3);
}

.stat-number {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
}

.action-breakdown {
  margin-top: 48px;
}

.action-bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  gap: 16px;
}

.action-bar-row .action-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.action-bar-row .action-name {
  width: 160px;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  flex-shrink: 0;
}

.action-bar-row .bar-track {
  flex: 1;
  height: 2px;
  background: var(--line);
  overflow: hidden;
  position: relative;
}

.action-bar-row .bar-fill {
  height: 100%;
  transition: width 1.2s ease-out;
}

.action-bar-row .action-count {
  width: 28px;
  text-align: right;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--dim);
  font-variant-numeric: tabular-nums;
}

.dot-green { background: var(--green); }
.dot-blue { background: #6a8fa7; }
.dot-purple { background: #9a7ab8; }
.dot-gold { background: var(--gold); }

.fill-green { background: var(--green); }
.fill-blue { background: #6a8fa7; }
.fill-purple { background: #9a7ab8; }
.fill-gold { background: var(--gold); }

/* ===== LEGEND ===== */
.legend {
  max-width: var(--max);
  margin: 0 auto 48px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* ===== TRILOGY CONTENT ===== */
.trilogy-section {
  padding: 100px 28px;
  max-width: 900px;
  margin: 0 auto;
}

.book {
  margin-bottom: 4px;
  border: 1px solid var(--line);
  overflow: hidden;
  transition: border-color 0.3s;
}

.book:hover {
  border-color: rgba(255,255,255,0.12);
}

.book-header {
  padding: 28px 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 20px;
  user-select: none;
  transition: background 0.3s;
  background: var(--bg2);
}

.book-header:hover {
  background: var(--bg3);
}

.book-number {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--green);
  min-width: 64px;
}

.book-title {
  font-family: var(--serif);
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 400;
  color: var(--text);
  flex: 1;
  letter-spacing: 0.04em;
}

.book-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.9rem;
  color: var(--dim);
  display: none;
}

@media (min-width: 700px) {
  .book-tagline { display: block; }
}

.book-count {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

.book-chevron {
  color: var(--green);
  font-size: 0.7rem;
  transition: transform 0.4s ease;
  flex-shrink: 0;
  opacity: 0.6;
}

.book.open .book-chevron {
  transform: rotate(90deg);
}

.book-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.book.open .book-body {
  max-height: 20000px;
}

/* ===== PARTS ===== */
.part {
  border-top: 1px solid var(--line);
}

.part-header {
  padding: 20px 32px 20px 48px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
  transition: background 0.3s;
}

.part-header:hover {
  background: rgba(122, 158, 126, 0.04);
}

.part-label {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  min-width: 64px;
  opacity: 0.7;
}

.part-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--green);
  flex: 1;
  letter-spacing: 0.03em;
}

.part-count {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 2px;
  color: var(--dim);
}

.part-chevron {
  color: var(--gold);
  font-size: 0.6rem;
  transition: transform 0.3s ease;
  flex-shrink: 0;
  opacity: 0.5;
}

.part.open .part-chevron {
  transform: rotate(90deg);
}

.part-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.part.open .part-body {
  max-height: 10000px;
}

/* ===== CHAPTERS ===== */
.chapter {
  padding: 0;
  border-top: 1px solid var(--line);
}

.chapter a {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 32px 16px 72px;
  text-decoration: none;
  color: inherit;
  transition: background 0.2s;
}

.chapter a:hover {
  background: rgba(122, 158, 126, 0.06);
}

.chapter a::after {
  content: '\2197';
  font-size: 0.7rem;
  color: var(--dim);
  opacity: 0;
  transition: opacity 0.2s;
  margin-top: 4px;
  flex-shrink: 0;
}

.chapter a:hover::after {
  opacity: 0.6;
}

.chapter-type-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
}

.chapter-num {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--dim);
  min-width: 20px;
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}

.chapter-info {
  flex: 1;
  min-width: 0;
}

.chapter-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.chapter-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.chapter-action-tag {
  display: inline-block;
  padding: 2px 8px;
  border: 1px solid;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.tag-use_as_is { border-color: rgba(122,158,126,0.3); color: var(--green); }
.tag-strip_production { border-color: rgba(106,143,167,0.3); color: #6a8fa7; }
.tag-rewrite_as_prose { border-color: rgba(154,122,184,0.3); color: #9a7ab8; }
.tag-write_new { border-color: rgba(184,151,58,0.3); color: var(--gold); }

.chapter-source {
  font-family: var(--mono);
  font-size: 0.55rem;
  color: #4a4840;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
  letter-spacing: 0.5px;
}

.chapter.is-prologue .chapter-title,
.chapter.is-epilogue .chapter-title {
  font-style: italic;
  color: var(--green);
}

/* ===== FOOTER ===== */
.site-footer {
  background: var(--bg2);
  border-top: 1px solid var(--line);
  padding: 80px 28px;
  text-align: center;
}

.footer-quote {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  color: var(--dim);
  max-width: 560px;
  margin: 0 auto 32px;
  line-height: 1.8;
}

.footer-quote em {
  color: var(--gold);
  font-style: normal;
}

.footer-credit {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  opacity: 0.5;
}

/* ===== SCROLL REVEAL ===== */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== READER OVERLAY ===== */
.reader-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1000;
  background: var(--bg);
  display: none;
  flex-direction: column;
}

.reader-overlay.active {
  display: flex;
}

.reader-nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: rgba(7,9,10,0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.reader-nav-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.reader-close {
  background: none;
  border: 1px solid var(--line);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 14px;
  cursor: pointer;
  border-radius: 2px;
  transition: color 0.2s, border-color 0.2s;
}

.reader-close:hover {
  color: var(--text);
  border-color: var(--green);
}

.reader-chapter-label {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--green);
}

.reader-nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.reader-btn {
  background: none;
  border: 1px solid var(--line);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  cursor: pointer;
  border-radius: 2px;
  transition: color 0.2s, border-color 0.2s;
}

.reader-btn:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--green);
}

.reader-btn:disabled {
  opacity: 0.25;
  cursor: default;
}

.reader-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.reader-content {
  max-width: var(--max);
  margin: 0 auto;
  padding: 60px 28px 120px;
}

.reader-content h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  color: var(--text);
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  line-height: 1.2;
}

.reader-content h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  color: var(--green);
  letter-spacing: 0.04em;
  margin-top: 48px;
  margin-bottom: 16px;
  line-height: 1.3;
}

.reader-content h3 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 1.15rem;
  color: var(--text);
  margin-top: 36px;
  margin-bottom: 12px;
}

.reader-content h4 {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 32px;
  margin-bottom: 12px;
}

.reader-content p {
  font-family: var(--sans);
  font-size: 1.05rem;
  font-weight: 300;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 20px;
}

.reader-content strong {
  font-weight: 500;
  color: var(--text);
}

.reader-content em {
  font-style: italic;
  color: var(--gold);
}

.reader-content blockquote {
  border-left: 2px solid var(--green);
  padding: 16px 24px;
  margin: 28px 0;
  background: rgba(122, 158, 126, 0.04);
}

.reader-content blockquote p,
.reader-content blockquote {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--dim);
  margin-bottom: 0;
}

.reader-content blockquote em {
  color: var(--gold);
}

.reader-content hr {
  border: none;
  border-top: 1px solid var(--line);
  margin: 40px 0;
}

.reader-content ul, .reader-content ol {
  padding-left: 24px;
  margin-bottom: 20px;
}

.reader-content li {
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 300;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 8px;
}

.reader-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--green);
  z-index: 1001;
  transition: width 0.1s;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .manifesto { padding: 60px 20px; }
  .trilogy-section { padding: 60px 16px; }
  .book-header { padding: 20px 16px; gap: 12px; }
  .part-header { padding: 16px 16px 16px 28px; }
  .chapter a { padding: 12px 16px 12px 36px; }
  .reader-nav { padding: 10px 16px; }
  .reader-content { padding: 40px 20px 100px; }
  .reader-btn { padding: 6px 10px; font-size: 0.55rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .action-bar-row .action-name { width: 100px; }
  .hero { padding: 40px 20px; }
}
</style>
</head>

<!-- ===== HERO ===== -->
<section class="hero">
  <canvas id="spiralCanvas"></canvas>
  <div class="hero-content">
    <div class="hero-label">the living book trilogy</div>
    <h1>The Living Age</h1>
    <div class="hero-subtitle">83 Chapters &middot; Three Books &middot; One Truth</div>
    <div class="hero-epigraph">
      "We work in the dark to serve the light.<br>We are <em>Sagents</em>."
    </div>
  </div>

</section>

<!-- ===== STATS DASHBOARD ===== -->
<section class="manifesto">
  <div class="manifesto-inner">
    <div class="section-label reveal">at a glance</div>
    <div class="stats-grid reveal" id="statsGrid"></div>
    <div class="legend reveal" id="legend"></div>
    <div class="action-breakdown reveal" id="actionBreakdown"></div>
  </div>
</section>

<!-- ===== TRILOGY ===== -->
<section class="trilogy-section">
  <div class="section-label reveal">table of contents</div>
  <div id="trilogy"></div>
</section>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <div class="footer-quote">
    <em>Clay to code.</em> Story to system.<br><em>The spiral defeats the block.</em>
  </div>
  <div class="footer-credit">the living age &middot; 2026</div>
</footer>

<!-- ===== READER OVERLAY ===== -->
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-progress" id="readerProgress"></div>
  <nav class="reader-nav">
    <div class="reader-nav-left">
      <button class="reader-close" id="readerClose">&#x2190; back</button>
      <span class="reader-chapter-label" id="readerLabel"></span>
    </div>
    <div class="reader-nav-right">
      <button class="reader-btn" id="readerPrev">&#9664; prev</button>
      <button class="reader-btn" id="readerNext">next &#9654;</button>
    </div>
  </nav>
  <div class="reader-body" id="readerBody">
    <div class="reader-content" id="readerContent"></div>
  </div>

<script>
// ===================== FIBONACCI SPIRAL CANVAS =====================
(function() {
  const canvas = document.getElementById('spiralCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  let frame = 0;

  function draw() {
    ctx.fillStyle = 'rgba(7,9,10,0.18)';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.min(W, H) * 0.42;
    const dots = 300;

    for (let i = 0; i < dots; i++) {
      const t = i / dots;
      const angle = i * goldenAngle + frame * 0.002;
      const r = maxR * Math.sqrt(t);
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);

      const hue = 45 + t * 90;
      const sat = 55 - t * 15;
      const lum = 32 + t * 23;
      const size = 4 - t * 2.5;
      const alpha = 0.15 + (1 - t) * 0.25;

      ctx.beginPath();
      ctx.arc(x, y, Math.max(size, 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, ${sat}%, ${lum}%, ${alpha})`;
      ctx.fill();
    }

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===================== SCROLL REVEAL =====================
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }

// ===================== COMPUTE STATS =====================
function computeStats() {
  let total = 0;
  const perBook = {};
  const perAction = { use_as_is: 0, strip_production: 0, rewrite_as_prose: 0, write_new: 0 };

  trilogy.forEach(book => {
    let count = 0;
    book.parts.forEach(p => p.chapters.forEach(ch => { total++; count++; perAction[ch.action]++; }));
    perBook[book.number] = count;
  });

  return { total, perBook, perAction };
}

// ===================== RENDER STATS =====================
(function renderStats() {
  const stats = computeStats();
  const grid = document.getElementById('statsGrid');

  grid.innerHTML = `
    <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">chapters</div></div>
    ${Object.entries(stats.perBook).map(([name, count]) =>
      `<div class="stat-card"><div class="stat-number">${count}</div><div class="stat-label">${name}</div></div>`
    ).join('')}
  `;

  const legend = document.getElementById('legend');
  legend.innerHTML = `
    <div class="legend-item"><div class="legend-dot dot-green"></div>original essay</div>
    <div class="legend-item"><div class="legend-dot dot-blue"></div>cleaned script</div>
    <div class="legend-item"><div class="legend-dot dot-purple"></div>rewritten as prose</div>
    <div class="legend-item"><div class="legend-dot dot-gold"></div>new chapter</div>
  `;

  const breakdown = document.getElementById('actionBreakdown');
  const maxAction = Math.max(...Object.values(stats.perAction));
  const labels = { use_as_is: 'original essay', strip_production: 'cleaned script', rewrite_as_prose: 'rewritten', write_new: 'new chapter' };

  breakdown.innerHTML = Object.entries(stats.perAction).map(([key, count]) => {
    const pct = (count / maxAction * 100).toFixed(1);
    return `<div class="action-bar-row">
      <div class="action-dot ${actionDotClass[key]}"></div>
      <div class="action-name">${labels[key]}</div>
      <div class="bar-track"><div class="bar-fill ${actionFillClass[key]}" style="width:${pct}%"></div></div>
      <div class="action-count">${count}</div>
    </div>`;
  }).join('');
})();

function getPdfHref(bookId, partLabel, chNum) {
  const key = `${bookId}|${partLabel}|${chNum}`;
  const path = pdfPaths[key];
  return path ? encodeURI(path) : null;
}

// ===================== RENDER TRILOGY =====================
(function renderTrilogy() {
  const container = document.getElementById('trilogy');

  trilogy.forEach(book => {
    const bookEl = document.createElement('div');
    bookEl.className = 'book reveal';
    bookEl.id = book.id;
    observer.observe(bookEl);

    let totalChapters = 0;
    book.parts.forEach(p => totalChapters += p.chapters.length);

    let html = `
      <div class="book-header">
        <span class="book-number">${book.number}</span>
        <span class="book-title">${book.title}</span>
        <span class="book-tagline">${book.tagline}</span>
        <span class="book-count">${totalChapters} ch</span>
        <span class="book-chevron">&#9654;</span>
      </div>
      <div class="book-body">
    `;

    book.parts.forEach((part, pi) => {
      html += `<div class="part">`;
      html += `<div class="part-header">
        <span class="part-label">${part.label}</span>
        <span class="part-title">${part.title}</span>
        <span class="part-count">${part.chapters.length} ch</span>
        <span class="part-chevron">&#9654;</span>
      </div>`;
      html += '<div class="part-body">';

      part.chapters.forEach(ch => {
        const extra = part.isPrologue ? ' is-prologue' : (part.isEpilogue ? ' is-epilogue' : '');
        const sourceHTML = ch.source
          ? `<span class="chapter-source" title="${ch.source}">${ch.source}</span>`
          : `<span class="chapter-source" style="color:rgba(184,151,58,0.4)">new content</span>`;

        const pdfPath = getPdfHref(book.id, part.label, ch.num);
        const rawPath = pdfPaths[`${book.id}|${part.label}|${ch.num}`] || '';
        const linkOpen = rawPath ? `<a href="#" onclick="event.preventDefault();openChapter('${rawPath.replace(/'/g, "\\'")}')">` : `<a href="#" onclick="return false" style="cursor:default">`;

        html += `<div class="chapter${extra}">
          ${linkOpen}
            <div class="chapter-type-dot ${actionDotClass[ch.action]}"></div>
            <div class="chapter-num">${ch.num}</div>
            <div class="chapter-info">
              <div class="chapter-title">${ch.title}</div>
              <div class="chapter-meta">
                <span class="chapter-action-tag tag-${ch.action}">${actionLabels[ch.action]}</span>
                ${sourceHTML}
              </div>
            </div>
          </a>
        </div>`;
      });

      html += '</div></div>';
    });

    html += '</div>';
    bookEl.innerHTML = html;
    container.appendChild(bookEl);

    bookEl.querySelector('.book-header').addEventListener('click', () => bookEl.classList.toggle('open'));
    bookEl.querySelectorAll('.part').forEach(partEl => {
      partEl.querySelector('.part-header').addEventListener('click', (e) => {
        e.stopPropagation();
        partEl.classList.toggle('open');
      });
    });
  });

  // Open Book I by default
  document.getElementById('book1').classList.add('open');
})();

// ===================== CHAPTER CONTENT DATA =====================
// Loaded from external file to keep the source manageable
let chapterContent = {};
(function loadContent() {
  const script = document.createElement('script');
  script.src = 'chapters_content.js';
  script.onload = () => { console.log('Chapter content loaded:', Object.keys(chapterContent).length, 'chapters'); };
  script.onerror = () => { console.warn('chapters_content.js not found — reader will show fallback text'); };
  document.head.appendChild(script);
})();

// ===================== READER LOGIC =====================
(function initReader() {
  const overlay = document.getElementById('readerOverlay');
  const body = document.getElementById('readerBody');
  const content = document.getElementById('readerContent');
  const label = document.getElementById('readerLabel');
  const progress = document.getElementById('readerProgress');
  const prevBtn = document.getElementById('readerPrev');
  const nextBtn = document.getElementById('readerNext');
  const closeBtn = document.getElementById('readerClose');

  // Build flat ordered list of all chapters with their PDF paths
  const chapterOrder = [];
  const chapterMeta = {};

  trilogy.forEach(book => {
    book.parts.forEach(part => {
      part.chapters.forEach(ch => {
        const key = `${book.id}|${part.label}|${ch.num}`;
        const pdfPath = pdfPaths[key];
        if (pdfPath) {
          chapterOrder.push(pdfPath);
          chapterMeta[pdfPath] = {
            book: book.title,
            bookNum: book.number,
            part: part.title,
            num: ch.num,
            title: ch.title
          };
        }
      });
    });
  });

  let currentIndex = -1;

  function openChapter(pdfPath) {
    const idx = chapterOrder.indexOf(pdfPath);
    if (idx === -1) return;
    currentIndex = idx;

    const meta = chapterMeta[pdfPath];
    const htmlContent = chapterContent[pdfPath] || '<p style="color:var(--dim);font-style:italic;">Content loading or not yet available. Make sure chapters_content.js is in the same folder.</p>';

    label.textContent = `${meta.bookNum} · ${meta.title}`;
    content.innerHTML = htmlContent;

    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === chapterOrder.length - 1);

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    body.scrollTop = 0;
    updateProgress();
  }

  function closeReader() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    currentIndex = -1;
    progress.style.width = '0';
  }

  function updateProgress() {
    const scrollTop = body.scrollTop;
    const scrollHeight = body.scrollHeight - body.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) : 0;
    progress.style.width = pct + '%';
  }

  // Event listeners
  closeBtn.addEventListener('click', closeReader);

  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) openChapter(chapterOrder[currentIndex - 1]);
  });

  nextBtn.addEventListener('click', () => {
    if (currentIndex < chapterOrder.length - 1) openChapter(chapterOrder[currentIndex + 1]);
  });

  body.addEventListener('scroll', updateProgress);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') closeReader();
    if (e.key === 'ArrowLeft' && currentIndex > 0) openChapter(chapterOrder[currentIndex - 1]);
    if (e.key === 'ArrowRight' && currentIndex < chapterOrder.length - 1) openChapter(chapterOrder[currentIndex + 1]);
  });

  // Expose globally so chapter links can call it
  window.openChapter = openChapter;
})();
</script>
