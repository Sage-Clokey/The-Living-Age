<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#fecaca"/>
    </linearGradient>
    <linearGradient id="livingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="questionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a3f"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="700" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">
    Figure 1: The Problem — How Does Life Organize Without a Controller?
  </text>
  <line x1="200" y1="68" x2="1200" y2="68" stroke="#adb5bd" stroke-width="1"/>

  <!-- ==================== LEFT PANEL: MACHINE MODEL ==================== -->
  <rect x="40" y="85" width="640" height="540" rx="16" fill="url(#machineGrad)" filter="url(#shadow)" stroke="#f87171" stroke-width="2"/>

  <!-- Left panel header -->
  <rect x="40" y="85" width="640" height="50" rx="16" fill="#dc2626"/>
  <rect x="40" y="110" width="640" height="25" fill="#dc2626"/>
  <text x="360" y="118" text-anchor="middle" font-size="20" font-weight="700" fill="white" letter-spacing="1">
    THE MACHINE MODEL
  </text>
  <text x="360" y="158" text-anchor="middle" font-size="13" fill="#991b1b" font-style="italic">
    What synthetic biology assumes: organisms are engineered devices
  </text>

  <!-- Hub-and-spoke centralized network -->
  <!-- Central hub -->
  <circle cx="360" cy="320" r="38" fill="#dc2626" stroke="#991b1b" stroke-width="3" filter="url(#shadowLight)"/>
  <text x="360" y="315" text-anchor="middle" font-size="11" fill="white" font-weight="700">MASTER</text>
  <text x="360" y="330" text-anchor="middle" font-size="11" fill="white" font-weight="700">CONTROLLER</text>

  <!-- Spoke nodes -->
  <line x1="360" y1="282" x2="360" y2="210" stroke="#991b1b" stroke-width="2.5" stroke-dasharray="none"/>
  <circle cx="360" cy="200" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="204" text-anchor="middle" font-size="9" fill="#7f1d1d">Part A</text>

  <line x1="396" y1="300" x2="480" y2="240" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="490" cy="232" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="490" y="236" text-anchor="middle" font-size="9" fill="#7f1d1d">Part B</text>

  <line x1="398" y1="320" x2="510" y2="320" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="520" cy="320" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="520" y="324" text-anchor="middle" font-size="9" fill="#7f1d1d">Part C</text>

  <line x1="396" y1="340" x2="480" y2="400" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="490" cy="410" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="490" y="414" text-anchor="middle" font-size="9" fill="#7f1d1d">Part D</text>

  <line x1="360" y1="358" x2="360" y2="430" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="360" cy="440" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="444" text-anchor="middle" font-size="9" fill="#7f1d1d">Part E</text>

  <line x1="324" y1="340" x2="240" y2="400" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="230" cy="410" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="414" text-anchor="middle" font-size="9" fill="#7f1d1d">Part F</text>

  <line x1="322" y1="320" x2="210" y2="320" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="200" cy="320" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="200" y="324" text-anchor="middle" font-size="9" fill="#7f1d1d">Part G</text>

  <line x1="324" y1="300" x2="240" y2="240" stroke="#991b1b" stroke-width="2.5"/>
  <circle cx="230" cy="232" r="20" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="236" text-anchor="middle" font-size="9" fill="#7f1d1d">Part H</text>

  <!-- Failure X over hub -->
  <g opacity="0.7">
    <line x1="530" y1="185" x2="570" y2="225" stroke="#7f1d1d" stroke-width="4"/>
    <line x1="570" y1="185" x2="530" y2="225" stroke="#7f1d1d" stroke-width="4"/>
    <text x="550" y="175" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="600">Remove hub =</text>
    <text x="550" y="242" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="600">total collapse</text>
  </g>

  <!-- Left panel bullets -->
  <text x="80" y="505" font-size="13" fill="#7f1d1d" font-weight="600">Top-down control: one master directs all parts</text>
  <text x="80" y="528" font-size="13" fill="#7f1d1d" font-weight="600">Fragile: remove the hub and the system fails</text>
  <text x="80" y="551" font-size="13" fill="#7f1d1d" font-weight="600">Parts have no autonomy — they execute instructions</text>
  <text x="80" y="574" font-size="13" fill="#7f1d1d" font-weight="600">Contradicted by gene network data (Barabasi, 1999)</text>

  <!-- Red bullets -->
  <circle cx="68" cy="501" r="4" fill="#dc2626"/>
  <circle cx="68" cy="524" r="4" fill="#dc2626"/>
  <circle cx="68" cy="547" r="4" fill="#dc2626"/>
  <circle cx="68" cy="570" r="4" fill="#dc2626"/>


  <!-- ==================== RIGHT PANEL: LIVING ECONOMY ==================== -->
  <rect x="720" y="85" width="640" height="540" rx="16" fill="url(#livingGrad)" filter="url(#shadow)" stroke="#22c55e" stroke-width="2"/>

  <!-- Right panel header -->
  <rect x="720" y="85" width="640" height="50" rx="16" fill="#16a34a"/>
  <rect x="720" y="110" width="640" height="25" fill="#16a34a"/>
  <text x="1040" y="118" text-anchor="middle" font-size="20" font-weight="700" fill="white" letter-spacing="1">
    THE LIVING ECONOMY
  </text>
  <text x="1040" y="158" text-anchor="middle" font-size="13" fill="#166534" font-style="italic">
    What the data shows: organisms are decentralized economies
  </text>

  <!-- Distributed network -->
  <!-- Nodes with many cross-connections -->
  <circle cx="880" cy="240" r="16" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="940" cy="210" r="14" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1010" cy="230" r="18" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1080" cy="210" r="13" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1140" cy="245" r="16" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="850" cy="310" r="14" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="920" cy="290" r="17" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="990" cy="310" r="15" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1060" cy="290" r="16" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1130" cy="315" r="14" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1190" cy="280" r="13" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="870" cy="380" r="15" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="950" cy="370" r="16" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1030" cy="385" r="14" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1100" cy="370" r="17" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1170" cy="380" r="13" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="910" cy="440" r="13" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1000" cy="450" r="15" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <circle cx="1080" cy="440" r="14" fill="#4ade80" stroke="#16a34a" stroke-width="2"/>

  <!-- Network edges (distributed, many-to-many) -->
  <g stroke="#16a34a" stroke-width="1.2" opacity="0.4">
    <!-- Row 1 connections -->
    <line x1="896" y1="240" x2="926" y2="210"/>
    <line x1="954" y1="210" x2="992" y2="230"/>
    <line x1="1028" y1="230" x2="1067" y2="210"/>
    <line x1="1093" y1="210" x2="1124" y2="245"/>
    <line x1="880" y1="256" x2="940" y2="224"/>
    <line x1="1010" y1="248" x2="1140" y2="245"/>
    <!-- Row 1 to Row 2 -->
    <line x1="880" y1="256" x2="850" y2="296"/>
    <line x1="880" y1="256" x2="920" y2="273"/>
    <line x1="940" y1="224" x2="920" y2="273"/>
    <line x1="940" y1="224" x2="990" y2="295"/>
    <line x1="1010" y1="248" x2="990" y2="295"/>
    <line x1="1010" y1="248" x2="1060" y2="274"/>
    <line x1="1080" y1="223" x2="1060" y2="274"/>
    <line x1="1080" y1="223" x2="1130" y2="301"/>
    <line x1="1140" y1="261" x2="1130" y2="301"/>
    <line x1="1140" y1="261" x2="1190" y2="267"/>
    <!-- Row 2 internal -->
    <line x1="864" y1="310" x2="903" y2="290"/>
    <line x1="937" y1="290" x2="975" y2="310"/>
    <line x1="1005" y1="310" x2="1044" y2="290"/>
    <line x1="1076" y1="290" x2="1116" y2="315"/>
    <line x1="1144" y1="315" x2="1177" y2="280"/>
    <!-- Row 2 to Row 3 -->
    <line x1="850" y1="324" x2="870" y2="365"/>
    <line x1="920" y1="307" x2="950" y2="354"/>
    <line x1="990" y1="325" x2="1030" y2="371"/>
    <line x1="1060" y1="306" x2="1100" y2="353"/>
    <line x1="1130" y1="329" x2="1170" y2="367"/>
    <line x1="920" y1="307" x2="870" y2="365"/>
    <line x1="1060" y1="306" x2="1030" y2="371"/>
    <line x1="1130" y1="329" x2="1100" y2="353"/>
    <!-- Row 3 internal -->
    <line x1="885" y1="380" x2="934" y2="370"/>
    <line x1="966" y1="370" x2="1016" y2="385"/>
    <line x1="1044" y1="385" x2="1083" y2="370"/>
    <line x1="1117" y1="370" x2="1157" y2="380"/>
    <!-- Row 3 to Row 4 -->
    <line x1="870" y1="395" x2="910" y2="427"/>
    <line x1="950" y1="386" x2="1000" y2="435"/>
    <line x1="1030" y1="399" x2="1000" y2="435"/>
    <line x1="1100" y1="387" x2="1080" y2="426"/>
    <line x1="950" y1="386" x2="910" y2="427"/>
    <line x1="1100" y1="387" x2="1080" y2="426"/>
    <!-- Cross connections for density -->
    <line x1="880" y1="256" x2="990" y2="295"/>
    <line x1="1010" y1="248" x2="1130" y2="301"/>
    <line x1="850" y1="324" x2="950" y2="354"/>
    <line x1="1060" y1="306" x2="1170" y2="367"/>
    <line x1="910" y1="440" x2="1000" y2="450"/>
    <line x1="1000" y1="450" x2="1080" y2="440"/>
  </g>

  <!-- Scale labels on right side -->
  <g font-size="12" fill="#166534">
    <rect x="755" y="220" width="90" height="28" rx="6" fill="#166534" opacity="0.12"/>
    <text x="800" y="239" text-anchor="middle" font-weight="700" font-size="11">GENES</text>

    <rect x="755" y="300" width="90" height="28" rx="6" fill="#166534" opacity="0.12"/>
    <text x="800" y="319" text-anchor="middle" font-weight="700" font-size="11">METABOLISM</text>

    <rect x="755" y="375" width="90" height="28" rx="6" fill="#166534" opacity="0.12"/>
    <text x="800" y="394" text-anchor="middle" font-weight="700" font-size="11">SPECIES</text>
  </g>

  <!-- "Remove any node" annotation -->
  <g opacity="0.8">
    <line x1="1175" y1="210" x2="1210" y2="195" stroke="#166534" stroke-width="1.5"/>
    <text x="1220" y="192" font-size="11" fill="#166534" font-weight="600">Remove any node —</text>
    <text x="1220" y="207" font-size="11" fill="#166534" font-weight="600">network adapts</text>
  </g>

  <!-- Right panel bullets -->
  <text x="760" y="505" font-size="13" fill="#166534" font-weight="600">No master gene, no central allocator, no blueprint</text>
  <text x="760" y="528" font-size="13" fill="#166534" font-weight="600">Robust: remove any node and the system adapts</text>
  <text x="760" y="551" font-size="13" fill="#166534" font-weight="600">Agents coordinate through local signals (like prices)</text>
  <text x="760" y="574" font-size="13" fill="#166534" font-weight="600">Same pattern at every scale: molecular → organismal</text>

  <!-- Green bullets -->
  <circle cx="748" cy="501" r="4" fill="#16a34a"/>
  <circle cx="748" cy="524" r="4" fill="#16a34a"/>
  <circle cx="748" cy="547" r="4" fill="#16a34a"/>
  <circle cx="748" cy="570" r="4" fill="#16a34a"/>


  <!-- ==================== CENTER DIVIDER ==================== -->
  <line x1="700" y1="120" x2="700" y2="590" stroke="#6b7280" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- VS badge -->
  <circle cx="700" cy="320" r="24" fill="white" stroke="#6b7280" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="700" y="326" text-anchor="middle" font-size="16" font-weight="800" fill="#374151">VS</text>


  <!-- ==================== BOTTOM: THREE LAYERS ==================== -->
  <rect x="40" y="645" width="1320" height="120" rx="14" fill="white" filter="url(#shadow)" stroke="#d1d5db" stroke-width="1"/>

  <text x="700" y="672" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">
    Three Layers of Evidence — Real Bioinformatics Data
  </text>

  <!-- Layer 1 -->
  <rect x="70" y="690" width="380" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="88" y="712" font-size="13" font-weight="700" fill="#1e40af">Layer 1: Network Topology</text>
  <text x="88" y="732" font-size="11.5" fill="#1e3a5f">Gene regulatory networks (RegulonDB, KEGG, STRING)</text>
  <text x="88" y="742" font-size="10" fill="#3b82f6" font-style="italic">→ Scale-free, decentralized, no master node</text>

  <!-- Layer 2 -->
  <rect x="470" y="690" width="380" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="488" y="712" font-size="13" font-weight="700" fill="#92400e">Layer 2: Metabolic Economy</text>
  <text x="488" y="732" font-size="11.5" fill="#78350f">Pathways as agents, ATP as currency (COBRApy, BiGG)</text>
  <text x="488" y="742" font-size="10" fill="#b45309" font-style="italic">→ Distributed allocation outperforms central planning</text>

  <!-- Layer 3 -->
  <rect x="870" y="690" width="380" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="888" y="712" font-size="13" font-weight="700" fill="#5b21b6">Layer 3: Cross-Species Trade</text>
  <text x="888" y="732" font-size="11.5" fill="#4c1d95">Gene exchange as trade network (NCBI, Kazusa)</text>
  <text x="888" y="742" font-size="10" fill="#7c3aed" font-style="italic">→ Organisms export specialties like nations in trade</text>

  <!-- Arrows between layers -->
  <path d="M 450 719 L 470 719" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 850 719 L 870 719" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#9ca3af"/>
    </marker>
  </defs>


  <!-- ==================== BOTTOM QUESTION BAR ==================== -->
  <rect x="40" y="790" width="1320" height="70" rx="14" fill="url(#questionGrad)" filter="url(#shadow)"/>
  <text x="700" y="822" text-anchor="middle" font-size="18" font-weight="700" fill="white" letter-spacing="0.5">
    Are living systems literally decentralized economies?
  </text>
  <text x="700" y="845" text-anchor="middle" font-size="13" fill="#a7f3d0">
    Not as metaphor — as measurable, quantifiable, structurally equivalent systems provable with public bioinformatics data.
  </text>

  <!-- Attribution -->
  <text x="700" y="888" text-anchor="middle" font-size="10.5" fill="#6b7280">
    Sage Clokey  |  BME 129C Capstone  |  UC Santa Cruz, Spring 2026  |  Advisor: R. Dubois
  </text>
</svg>