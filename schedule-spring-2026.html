<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring 2026 Schedule — The Living Age</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #3b82f6; --blue-bg: #dbeafe; --blue-border: #93bbfd;
  --green: #16a34a; --green-bg: #dcfce7; --green-border: #86efac;
  --red: #dc2626; --red-bg: #fee2e2; --red-border: #fca5a5;
  --orange: #ea580c; --orange-bg: #ffedd5; --orange-border: #fdba74;
  --purple: #7c3aed; --purple-bg: #ede9fe; --purple-border: #c4b5fd;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
  --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --gray-900: #111827;
  --hour-height: 60px;
  --header-height: 64px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--gray-50); color: var(--gray-800);
  line-height: 1.5; overflow: hidden; height: 100vh;
}

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: #fff; border-bottom: 1px solid var(--gray-200);
  height: var(--header-height); flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-title { font-size: 20px; font-weight: 700; color: var(--gray-900); white-space: nowrap; }
.header-date { font-size: 16px; font-weight: 500; color: var(--gray-600); min-width: 220px; }

.btn {
  padding: 6px 14px; border: 1px solid var(--gray-300); border-radius: 6px;
  background: #fff; color: var(--gray-700); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s; user-select: none;
}
.btn:hover { background: var(--gray-100); border-color: var(--gray-400); }
.btn.active { background: var(--gray-800); color: #fff; border-color: var(--gray-800); }

.nav-group { display: flex; gap: 4px; }
.view-group { display: flex; gap: 0; }
.view-group .btn { border-radius: 0; margin-left: -1px; }
.view-group .btn:first-child { border-radius: 6px 0 0 6px; }
.view-group .btn:last-child { border-radius: 0 6px 6px 0; }

.header-right { display: flex; align-items: center; gap: 16px; }

.legend { display: flex; gap: 12px; font-size: 11px; font-weight: 500; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }
.calendar-container { flex: 1; overflow: auto; position: relative; }

/* MONTH VIEW */
.month-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-left: 1px solid var(--gray-200); border-top: 1px solid var(--gray-200);
  min-height: 100%;
}
.month-header-cell {
  padding: 8px; text-align: center; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500);
  background: #fff; border-right: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200);
  position: sticky; top: 0; z-index: 2;
}
.month-cell {
  min-height: 110px; padding: 4px; border-right: 1px solid var(--gray-200);
  border-bottom: 1px solid var(--gray-200); background: #fff; position: relative;
  cursor: pointer; transition: background .1s;
}
.month-cell:hover { background: var(--gray-50); }
.month-cell.outside { background: var(--gray-50); }
.month-cell.outside .day-num { color: var(--gray-400); }
.month-cell.today { background: #eff6ff; }
.month-cell .day-num {
  font-size: 13px; font-weight: 500; padding: 2px 6px; display: inline-block; border-radius: 50%;
  color: var(--gray-700);
}
.month-cell.today .day-num { background: var(--blue); color: #fff; }
.month-event {
  font-size: 11px; padding: 1px 4px; margin-top: 1px; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  font-weight: 500; line-height: 1.4;
}
.month-event.cat-class { background: var(--blue-bg); color: #1e40af; border-left: 3px solid var(--blue); }
.month-event.cat-conference { background: var(--green-bg); color: #166534; border-left: 3px solid var(--green); }
.month-event.cat-deadline { background: var(--red-bg); color: #991b1b; border-left: 3px solid var(--red); }
.month-event.cat-training { background: var(--orange-bg); color: #9a3412; border-left: 3px solid var(--orange); }
.month-event.cat-personal { background: var(--purple-bg); color: #5b21b6; border-left: 3px solid var(--purple); }
.month-more { font-size: 10px; color: var(--gray-500); padding: 1px 4px; cursor: pointer; font-weight: 600; }

/* WEEK / DAY VIEW */
.week-wrapper { display: flex; flex-direction: column; height: 100%; }
.week-header-row {
  display: grid; position: sticky; top: 0; z-index: 5; background: #fff;
  border-bottom: 1px solid var(--gray-200);
}
.week-header-row.week-mode { grid-template-columns: 60px repeat(7, 1fr); }
.week-header-row.day-mode { grid-template-columns: 60px 1fr; }
.week-col-header {
  text-align: center; padding: 8px 4px; border-left: 1px solid var(--gray-200);
}
.week-col-header .dow { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--gray-500); letter-spacing: .5px; }
.week-col-header .dom { font-size: 22px; font-weight: 500; color: var(--gray-700); margin-top: 2px; }
.week-col-header.today .dom {
  background: var(--blue); color: #fff; width: 36px; height: 36px;
  border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
}
.week-col-header.today .dow { color: var(--blue); }
.all-day-row {
  display: grid; border-bottom: 1px solid var(--gray-200); min-height: 28px;
  position: sticky; z-index: 4; background: #fff;
}
.all-day-row.week-mode { grid-template-columns: 60px repeat(7, 1fr); }
.all-day-row.day-mode { grid-template-columns: 60px 1fr; }
.all-day-label {
  font-size: 10px; color: var(--gray-500); padding: 4px; text-align: right; padding-right: 8px;
  border-right: 1px solid var(--gray-200); font-weight: 500;
}
.all-day-cell { border-left: 1px solid var(--gray-200); padding: 2px; display: flex; flex-wrap: wrap; gap: 2px; }
.all-day-event {
  font-size: 11px; padding: 1px 6px; border-radius: 3px; font-weight: 500; cursor: pointer; white-space: nowrap;
}
.all-day-event.cat-class { background: var(--blue-bg); color: #1e40af; }
.all-day-event.cat-conference { background: var(--green-bg); color: #166534; }
.all-day-event.cat-deadline { background: var(--red-bg); color: #991b1b; }
.all-day-event.cat-training { background: var(--orange-bg); color: #9a3412; }
.all-day-event.cat-personal { background: var(--purple-bg); color: #5b21b6; }

.time-grid-scroll { flex: 1; overflow-y: auto; }
.time-grid { display: grid; position: relative; }
.time-grid.week-mode { grid-template-columns: 60px repeat(7, 1fr); }
.time-grid.day-mode { grid-template-columns: 60px 1fr; }

.time-label-col { position: relative; }
.time-label {
  position: absolute; right: 8px; font-size: 10px; color: var(--gray-500);
  transform: translateY(-50%); font-weight: 500;
}
.day-column { position: relative; border-left: 1px solid var(--gray-200); }
.hour-line {
  position: absolute; left: 0; right: 0; border-top: 1px solid var(--gray-200);
}
.hour-line.half { border-top: 1px dashed var(--gray-100); }

.event-block {
  position: absolute; border-radius: 5px;
  padding: 3px 6px; font-size: 11px; overflow: hidden; cursor: pointer;
  z-index: 1; transition: box-shadow .15s, transform .1s; border-left: 3px solid;
  line-height: 1.3;
}
.event-block:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: scale(1.01); z-index: 3; }
.event-block .ev-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-block .ev-time { font-size: 10px; opacity: .8; }
.event-block .ev-loc { font-size: 10px; opacity: .7; font-style: italic; }

.event-block.cat-class { background: var(--blue-bg); color: #1e40af; border-left-color: var(--blue); }
.event-block.cat-conference { background: var(--green-bg); color: #166534; border-left-color: var(--green); }
.event-block.cat-deadline { background: var(--red-bg); color: #991b1b; border-left-color: var(--red); }
.event-block.cat-training { background: var(--orange-bg); color: #9a3412; border-left-color: var(--orange); }
.event-block.cat-personal { background: var(--purple-bg); color: #5b21b6; border-left-color: var(--purple); }

/* now line */
.now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--red); z-index: 2; pointer-events: none; }
.now-line::before {
  content: ''; position: absolute; left: -4px; top: -4px; width: 10px; height: 10px;
  background: var(--red); border-radius: 50%;
}

/* POPUP */
.popup-overlay {
  position: fixed; inset: 0; z-index: 100; display: none;
}
.popup-overlay.show { display: block; }
.popup {
  position: fixed; z-index: 101; background: #fff; border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2); padding: 20px; min-width: 300px; max-width: 400px;
}
.popup-cat {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
}
.popup-cat.cat-class { background: var(--blue-bg); color: #1e40af; }
.popup-cat.cat-conference { background: var(--green-bg); color: #166534; }
.popup-cat.cat-deadline { background: var(--red-bg); color: #991b1b; }
.popup-cat.cat-training { background: var(--orange-bg); color: #9a3412; }
.popup-cat.cat-personal { background: var(--purple-bg); color: #5b21b6; }
.popup-title { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
.popup-detail { font-size: 13px; color: var(--gray-600); margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
.popup-detail svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
.popup-close {
  position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
  border: none; background: var(--gray-100); border-radius: 50%; cursor: pointer;
  font-size: 16px; color: var(--gray-500); display: flex; align-items: center; justify-content: center;
}
.popup-close:hover { background: var(--gray-200); }

/* Today column highlight */
.day-column.today-col { background: rgba(59,130,246,.03); }

@media (max-width: 768px) {
  .header { flex-direction: column; height: auto; gap: 8px; padding: 8px 12px; }
  .header-left { flex-wrap: wrap; }
  .legend { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Spring 2026</div>
      <div class="nav-group">
        <button class="btn" id="btn-today">Today</button>
        <button class="btn" id="btn-prev">&#8249;</button>
        <button class="btn" id="btn-next">&#8250;</button>
      </div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-right">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Classes</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Conferences</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Deadlines</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Training</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Personal</div>
      </div>
      <div class="view-group">
        <button class="btn" data-view="month">Month</button>
        <button class="btn active" data-view="week">Week</button>
        <button class="btn" data-view="day">Day</button>
      </div>
    </div>
  </div>
  <div class="calendar-container" id="cal-container"></div>
</div>

<div class="popup-overlay" id="popup-overlay"></div>
<div class="popup" id="popup" style="display:none">
  <button class="popup-close" id="popup-close">&times;</button>
  <div id="popup-content"></div>
</div>

<script>
// ── DATA ──
const CATEGORIES = { class:'cat-class', conference:'cat-conference', deadline:'cat-deadline', training:'cat-training', personal:'cat-personal' };
const CAT_LABELS = { class:'Class', conference:'Conference', deadline:'Deadline', training:'Training', personal:'Personal' };

function makeRecurring(name, days, startH, startM, endH, endM, location, cat, startDate, endDate) {
  const events = [];
  const d = new Date(startDate + 'T00:00:00');
  const end = new Date(endDate + 'T00:00:00');
  while (d <= end) {
    if (days.includes(d.getDay())) {
      events.push({
        title: name, cat: cat,
        start: new Date(d.getFullYear(), d.getMonth(), d.getDate(), startH, startM),
        end: new Date(d.getFullYear(), d.getMonth(), d.getDate(), endH, endM),
        location: location, allDay: false
      });
    }
    d.setDate(d.getDate() + 1);
  }
  return events;
}

function makeMultiDay(name, startStr, endStr, location, cat) {
  const events = [];
  const s = new Date(startStr + 'T00:00:00');
  const e = new Date(endStr + 'T00:00:00');
  const d = new Date(s);
  while (d <= e) {
    events.push({
      title: name, cat: cat,
      start: new Date(d), end: new Date(d),
      location: location, allDay: true,
      spanStart: startStr, spanEnd: endStr
    });
    d.setDate(d.getDate() + 1);
  }
  return events;
}

function makeSingle(name, dateStr, startH, startM, endH, endM, location, cat) {
  const d = new Date(dateStr + 'T00:00:00');
  return [{
    title: name, cat: cat,
    start: new Date(d.getFullYear(), d.getMonth(), d.getDate(), startH, startM),
    end: new Date(d.getFullYear(), d.getMonth(), d.getDate(), endH, endM),
    location: location, allDay: false
  }];
}

function makeAllDay(name, dateStr, location, cat) {
  const d = new Date(dateStr + 'T00:00:00');
  return [{ title: name, cat: cat, start: d, end: d, location: location, allDay: true }];
}

const ALL_EVENTS = [
  // Recurring classes: MWF=[1,3,5], TuTh=[2,4], Mon=[1], Fri=[5]
  ...makeRecurring('BME 129C — Capstone Lab', [1,3,5], 9,20, 10,25, 'UCSC', 'class', '2026-03-30', '2026-06-05'),
  ...makeRecurring('BME 80G — Bioethics', [1,3,5], 13,20, 14,25, 'UCSC', 'class', '2026-03-30', '2026-06-05'),
  ...makeRecurring('BME 80G — Discussion Section', [5], 10,40, 11,45, 'UCSC', 'class', '2026-03-30', '2026-06-05'),
  ...makeRecurring('BME 234 — Comp Genomics/ML', [2,4], 17,20, 18,55, 'R Carson Acad 252', 'class', '2026-03-30', '2026-06-05'),
  ...makeRecurring('Entrepreneurship Book Club', [1], 14,30, 16,0, 'UCSC (Bernick)', 'class', '2026-03-30', '2026-06-05'),

  // Multi-day events
  ...makeMultiDay('SynBioBeta 2026', '2026-05-04', '2026-05-07', 'San Jose Convention Center', 'conference'),
  ...makeMultiDay('UCSC Finals', '2026-06-08', '2026-06-11', 'UCSC', 'class'),
  ...makeMultiDay('Live Oak Music Festival', '2026-06-19', '2026-06-21', 'El Chorro Regional Park, SLO', 'personal'),
  ...makeMultiDay('PorcFest 2026', '2026-06-21', '2026-06-28', 'New Hampshire', 'conference'),
  ...makeMultiDay('FreedomFest 2026', '2026-07-08', '2026-07-11', 'Las Vegas', 'conference'),
  ...makeMultiDay('FEE Summer Campus', '2026-07-20', '2026-07-24', 'University of Maryland', 'training'),
  ...makeMultiDay('Cato University Session I', '2026-08-05', '2026-08-08', 'TBD', 'training'),
  ...makeMultiDay('Cato University Session II', '2026-08-19', '2026-08-22', 'TBD', 'training'),

  // All-day single
  ...makeAllDay('FEE Application Deadline', '2026-05-20', '', 'deadline'),
  ...makeAllDay('PhD App Opens — UCSC BMEB', '2026-10-01', 'UCSC', 'deadline'),

  // One-offs
  ...makeSingle('Stossel Fellowship Video Shoot', '2026-04-09', 8,0, 9,0, 'Apartment complex lawn', 'personal'),
  ...makeSingle('LI: Working Smarter with AI', '2026-04-09', 10,0, 13,0, 'Online (Leadership Institute)', 'training'),
  ...makeSingle('LI: TV Workshop On-Camera', '2026-04-28', 11,0, 14,0, 'Online (Leadership Institute)', 'training'),
  ...makeSingle('BME 80G: Pizza Lunch w/ Dr. Sara Ackerman', '2026-04-10', 12,0, 13,0, 'JBEB 263', 'class'),
  ...makeSingle('Mom picks up — drive to SLO for 4Runner', '2026-04-10', 15,0, 18,0, 'Santa Cruz → SLO (body shop)', 'personal'),
];

// ── STATE ──
let currentView = 'week';
let viewDate = new Date(2026, 3, 8); // April 8, 2026
const TODAY = new Date(2026, 3, 8);

// ── UTILS ──
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function startOfWeek(d) { const r = new Date(d); r.setDate(r.getDate() - r.getDay()); return r; }
function fmtTime(d) {
  let h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + (m ? ':' + String(m).padStart(2,'0') : '') + ' ' + ap;
}
function fmtDate(d) {
  return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function fmtDateShort(d) {
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()] + ' ' + d.getDate();
}
const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function eventsOnDay(d) {
  return ALL_EVENTS.filter(e => sameDay(e.start, d));
}

const START_HOUR = 6, END_HOUR = 22;
const TOTAL_HOURS = END_HOUR - START_HOUR;

// ── RENDERING ──
const container = document.getElementById('cal-container');
const headerDate = document.getElementById('header-date');

function render() {
  container.innerHTML = '';
  if (currentView === 'month') renderMonth();
  else if (currentView === 'week') renderWeek();
  else renderDay();
  updateHeaderDate();
}

function updateHeaderDate() {
  if (currentView === 'month') {
    headerDate.textContent = MONTHS[viewDate.getMonth()] + ' ' + viewDate.getFullYear();
  } else if (currentView === 'week') {
    const ws = startOfWeek(viewDate);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    headerDate.textContent = fmtDateShort(ws) + ' \u2014 ' + fmtDateShort(we) + ', ' + we.getFullYear();
  } else {
    headerDate.textContent = DOW_FULL[viewDate.getDay()] + ', ' + fmtDate(viewDate);
  }
}

// ── MONTH VIEW ──
function renderMonth() {
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();
  const grid = document.createElement('div');
  grid.className = 'month-grid';

  DOW_SHORT.forEach(d => {
    const h = document.createElement('div');
    h.className = 'month-header-cell';
    h.textContent = d;
    grid.appendChild(h);
  });

  const totalCells = Math.ceil((startDay + last.getDate()) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'month-cell';
    const date = new Date(year, month, 1 - startDay + i);
    if (date.getMonth() !== month) cell.classList.add('outside');
    if (sameDay(date, TODAY)) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = date.getDate();
    cell.appendChild(num);

    const dayEvents = eventsOnDay(date);
    const MAX_SHOW = 3;
    dayEvents.slice(0, MAX_SHOW).forEach(ev => {
      const el = document.createElement('div');
      el.className = 'month-event ' + CATEGORIES[ev.cat];
      el.textContent = (ev.allDay ? '' : fmtTime(ev.start) + ' ') + ev.title;
      el.addEventListener('click', e => { e.stopPropagation(); showPopup(ev, e); });
      cell.appendChild(el);
    });
    if (dayEvents.length > MAX_SHOW) {
      const more = document.createElement('div');
      more.className = 'month-more';
      more.textContent = '+' + (dayEvents.length - MAX_SHOW) + ' more';
      cell.appendChild(more);
    }

    const clickDate = new Date(date);
    cell.addEventListener('click', () => { viewDate = new Date(clickDate); currentView = 'day'; setActiveViewBtn(); render(); });
    grid.appendChild(cell);
  }
  container.appendChild(grid);
}

// ── WEEK VIEW ──
function renderWeek() { renderTimeGrid(7); }

// ── DAY VIEW ──
function renderDay() { renderTimeGrid(1); }

function renderTimeGrid(numDays) {
  const mode = numDays === 7 ? 'week-mode' : 'day-mode';
  const ws = numDays === 7 ? startOfWeek(viewDate) : new Date(viewDate);
  const wrapper = document.createElement('div');
  wrapper.className = 'week-wrapper';

  // Header row
  const hrow = document.createElement('div');
  hrow.className = 'week-header-row ' + mode;
  const corner = document.createElement('div');
  corner.style.borderRight = '1px solid var(--gray-200)';
  hrow.appendChild(corner);
  const days = [];
  for (let i = 0; i < numDays; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    days.push(d);
    const col = document.createElement('div');
    col.className = 'week-col-header' + (sameDay(d, TODAY) ? ' today' : '');
    col.innerHTML = '<div class="dow">' + DOW_SHORT[d.getDay()] + '</div><div class="dom">' + d.getDate() + '</div>';
    hrow.appendChild(col);
  }
  wrapper.appendChild(hrow);

  // All-day row
  const adRow = document.createElement('div');
  adRow.className = 'all-day-row ' + mode;
  const adLabel = document.createElement('div');
  adLabel.className = 'all-day-label';
  adLabel.textContent = 'all-day';
  adRow.appendChild(adLabel);
  days.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'all-day-cell';
    eventsOnDay(d).filter(e => e.allDay).forEach(ev => {
      const el = document.createElement('div');
      el.className = 'all-day-event ' + CATEGORIES[ev.cat];
      el.textContent = ev.title;
      el.addEventListener('click', e => { e.stopPropagation(); showPopup(ev, e); });
      cell.appendChild(el);
    });
    adRow.appendChild(cell);
  });
  wrapper.appendChild(adRow);

  // Time grid
  const scrollArea = document.createElement('div');
  scrollArea.className = 'time-grid-scroll';
  const grid = document.createElement('div');
  grid.className = 'time-grid ' + mode;
  grid.style.height = (TOTAL_HOURS * 60) + 'px';

  // Time labels
  const labelCol = document.createElement('div');
  labelCol.className = 'time-label-col';
  labelCol.style.borderRight = '1px solid var(--gray-200)';
  labelCol.style.position = 'relative';
  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.style.top = ((h - START_HOUR) * 60) + 'px';
    const hr = h % 12 || 12;
    lbl.textContent = hr + ' ' + (h >= 12 ? 'PM' : 'AM');
    labelCol.appendChild(lbl);
  }
  grid.appendChild(labelCol);

  // Day columns
  days.forEach(d => {
    const col = document.createElement('div');
    col.className = 'day-column' + (sameDay(d, TODAY) ? ' today-col' : '');

    // Hour lines
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = ((h - START_HOUR) * 60) + 'px';
      col.appendChild(line);
      if (h < END_HOUR) {
        const half = document.createElement('div');
        half.className = 'hour-line half';
        half.style.top = ((h - START_HOUR) * 60 + 30) + 'px';
        col.appendChild(half);
      }
    }

    // Events
    const dayEvs = eventsOnDay(d).filter(e => !e.allDay);
    const placed = layoutEvents(dayEvs);
    placed.forEach(function(item) {
      const ev = item.ev;
      const c = item.col;
      const totalCols = item.totalCols;
      const top = ((ev.start.getHours() - START_HOUR) * 60 + ev.start.getMinutes());
      const bottom = ((ev.end.getHours() - START_HOUR) * 60 + ev.end.getMinutes());
      const height = Math.max(bottom - top, 20);
      const width = (100 / totalCols);
      const left = c * width;

      const block = document.createElement('div');
      block.className = 'event-block ' + CATEGORIES[ev.cat];
      block.style.top = top + 'px';
      block.style.height = height + 'px';
      block.style.left = 'calc(' + left + '% + 2px)';
      block.style.width = 'calc(' + width + '% - 4px)';

      let inner = '<div class="ev-title">' + ev.title + '</div>';
      if (height > 30) inner += '<div class="ev-time">' + fmtTime(ev.start) + ' \u2014 ' + fmtTime(ev.end) + '</div>';
      if (height > 48 && ev.location) inner += '<div class="ev-loc">' + ev.location + '</div>';
      block.innerHTML = inner;
      block.addEventListener('click', function(e) { e.stopPropagation(); showPopup(ev, e); });
      col.appendChild(block);
    });

    // Now line (for today)
    if (sameDay(d, TODAY)) {
      const now = new Date();
      const nowMin = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
      if (nowMin >= 0 && nowMin <= TOTAL_HOURS * 60) {
        const nl = document.createElement('div');
        nl.className = 'now-line';
        nl.style.top = nowMin + 'px';
        col.appendChild(nl);
      }
    }

    const clickDate = new Date(d);
    col.addEventListener('click', function() {
      if (numDays === 7) { viewDate = new Date(clickDate); currentView = 'day'; setActiveViewBtn(); render(); }
    });
    grid.appendChild(col);
  });

  scrollArea.appendChild(grid);
  wrapper.appendChild(scrollArea);
  container.appendChild(wrapper);

  // Scroll to 8 AM area
  setTimeout(function() { scrollArea.scrollTop = (8 - START_HOUR) * 60 - 20; }, 0);
}

function layoutEvents(events) {
  if (!events.length) return [];
  events.sort(function(a, b) { return a.start - b.start || b.end - a.end; });
  var groups = [];
  var groupEnd = null;
  var currentGroup = [];

  events.forEach(function(ev) {
    var s = ev.start.getHours() * 60 + ev.start.getMinutes();
    var e = ev.end.getHours() * 60 + ev.end.getMinutes();
    if (groupEnd !== null && s < groupEnd) {
      currentGroup.push({ ev: ev, s: s, e: e });
      if (e > groupEnd) groupEnd = e;
    } else {
      if (currentGroup.length) groups.push(currentGroup);
      currentGroup = [{ ev: ev, s: s, e: e }];
      groupEnd = e;
    }
  });
  if (currentGroup.length) groups.push(currentGroup);

  var result = [];
  groups.forEach(function(group) {
    var cols = [];
    group.forEach(function(item) {
      var placed = false;
      for (var c = 0; c < cols.length; c++) {
        if (item.s >= cols[c]) {
          cols[c] = item.e;
          result.push({ ev: item.ev, col: c, totalCols: 0 });
          placed = true;
          break;
        }
      }
      if (!placed) {
        cols.push(item.e);
        result.push({ ev: item.ev, col: cols.length - 1, totalCols: 0 });
      }
    });
    var total = cols.length;
    for (var i = result.length - group.length; i < result.length; i++) {
      result[i].totalCols = total;
    }
  });
  return result;
}

// ── POPUP ──
var popupEl = document.getElementById('popup');
var popupOverlay = document.getElementById('popup-overlay');
var popupContent = document.getElementById('popup-content');

function showPopup(ev, mouseEvent) {
  var catClass = CATEGORIES[ev.cat];
  var catLabel = CAT_LABELS[ev.cat];
  var timeStr = '';
  if (ev.allDay) {
    if (ev.spanStart && ev.spanStart !== ev.spanEnd) {
      var sd = new Date(ev.spanStart + 'T00:00:00');
      var ed = new Date(ev.spanEnd + 'T00:00:00');
      timeStr = fmtDate(sd) + ' \u2014 ' + fmtDate(ed);
    } else {
      timeStr = fmtDate(ev.start) + ' (All day)';
    }
  } else {
    timeStr = DOW_FULL[ev.start.getDay()] + ', ' + fmtDate(ev.start) + '<br>' + fmtTime(ev.start) + ' \u2014 ' + fmtTime(ev.end);
  }

  popupContent.innerHTML =
    '<div class="popup-cat ' + catClass + '">' + catLabel + '</div>' +
    '<div class="popup-title">' + ev.title + '</div>' +
    '<div class="popup-detail">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' +
      '<span>' + timeStr + '</span>' +
    '</div>' +
    (ev.location ? '<div class="popup-detail">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
      '<span>' + ev.location + '</span>' +
    '</div>' : '');

  popupEl.style.display = 'block';
  popupOverlay.classList.add('show');

  var x = Math.min(mouseEvent.clientX + 12, window.innerWidth - 420);
  var y = Math.min(mouseEvent.clientY + 12, window.innerHeight - 220);
  if (x < 10) x = 10;
  if (y < 10) y = 10;
  popupEl.style.left = x + 'px';
  popupEl.style.top = y + 'px';
}

function hidePopup() {
  popupEl.style.display = 'none';
  popupOverlay.classList.remove('show');
}
document.getElementById('popup-close').addEventListener('click', hidePopup);
popupOverlay.addEventListener('click', hidePopup);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hidePopup(); });

// ── NAV ──
document.getElementById('btn-prev').addEventListener('click', function() {
  if (currentView === 'month') viewDate.setMonth(viewDate.getMonth() - 1);
  else if (currentView === 'week') viewDate.setDate(viewDate.getDate() - 7);
  else viewDate.setDate(viewDate.getDate() - 1);
  render();
});
document.getElementById('btn-next').addEventListener('click', function() {
  if (currentView === 'month') viewDate.setMonth(viewDate.getMonth() + 1);
  else if (currentView === 'week') viewDate.setDate(viewDate.getDate() + 7);
  else viewDate.setDate(viewDate.getDate() + 1);
  render();
});
document.getElementById('btn-today').addEventListener('click', function() {
  viewDate = new Date(TODAY);
  render();
});

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { document.getElementById('btn-prev').click(); }
  else if (e.key === 'ArrowRight') { document.getElementById('btn-next').click(); }
  else if (e.key === 't') { document.getElementById('btn-today').click(); }
  else if (e.key === 'm') { currentView = 'month'; setActiveViewBtn(); render(); }
  else if (e.key === 'w') { currentView = 'week'; setActiveViewBtn(); render(); }
  else if (e.key === 'd') { currentView = 'day'; setActiveViewBtn(); render(); }
});

function setActiveViewBtn() {
  document.querySelectorAll('.view-group .btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === currentView);
  });
}
document.querySelectorAll('.view-group .btn').forEach(function(b) {
  b.addEventListener('click', function() {
    currentView = b.dataset.view;
    setActiveViewBtn();
    render();
  });
});

// Initial render
render();
</script>
